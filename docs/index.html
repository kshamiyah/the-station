<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Station - O&G Newsletter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.6;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.25rem;
            color: #86868b;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .subtitle {
            font-size: 1rem;
            color: #86868b;
            margin-top: 8px;
            font-weight: 400;
        }

        .newsletter-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1d1d1f;
        }

        .newsletter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }

        .newsletter-card {
            background-color: #f5f5f7;
            border-radius: 18px;
            padding: 32px 24px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 200px;
            border: 1px solid #e5e5e7;
        }

        .newsletter-card:hover {
            background-color: #f5f5f7;
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        .newsletter-card:active {
            transform: scale(0.98);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 0.9rem;
            color: #86868b;
        }

        .footer {
            text-align: center;
            padding-top: 60px;
            border-top: 1px solid #e5e5e7;
            margin-top: 60px;
        }

        .footer-text {
            font-size: 0.9rem;
            color: #86868b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 16px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1.1rem;
            }

            .newsletter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>The Station</h1>
            <p class="tagline">Engaged with the evidence.</p>
            <p class="subtitle">O&G Departmental Educational Newsletter</p>
        </div>

        <div class="newsletter-section">
            <h2 class="section-title">Latest Editions</h2>
            <div class="newsletter-grid">
                <a href="april-2026.html" class="newsletter-card">
                    <div class="card-title">April 2026</div>
                    <div class="card-meta">Latest Edition</div>
                </a>
                <a href="march-2026.html" class="newsletter-card">
                    <div class="card-title">March 2026</div>
                    <div class="card-meta">Edition</div>
                </a>
                <a href="february-2026.html" class="newsletter-card">
                    <div class="card-title">February 2026</div>
                    <div class="card-meta">Edition</div>
                </a>
                <a href="january-2026.html" class="newsletter-card">
                    <div class="card-title">January 2026</div>
                    <div class="card-meta">Edition</div>
                </a>
            </div>
        </div>

        <div class="footer">
            <p class="footer-text">New edition published the first Sunday of each month</p>
        </div>
    </div>
</body>
</html>
