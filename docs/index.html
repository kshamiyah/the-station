<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Station - O&G Newsletter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1d1d1f;
            line-height: 1.6;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 1.25rem;
            color: #86868b;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .subtitle {
            font-size: 1rem;
            color: #86868b;
            margin-top: 8px;
            font-weight: 400;
        }

        .newsletter-section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #1d1d1f;
        }

        .newsletter-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            margin-left: auto;
            margin-right: auto;
        }

        .newsletter-item {
            background-color: transparent;
            border: 1px solid #e5e5e7;
            border-radius: 8px;
            padding: 14px 18px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .newsletter-item:hover {
            background-color: #f9f9f9;
            border-color: #d1d1d6;
        }

        .newsletter-item:active {
            transform: scale(0.98);
        }

        .item-content {
            text-align: left;
        }

        .item-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .item-meta {
            font-size: 0.85rem;
            color: #86868b;
        }

        .item-arrow {
            color: #d1d1d6;
            font-size: 1rem;
            margin-left: 12px;
            flex-shrink: 0;
        }

        .footer {
            text-align: center;
            padding-top: 60px;
            border-top: 1px solid #e5e5e7;
            margin-top: 60px;
        }

        .footer-text {
            font-size: 0.9rem;
            color: #86868b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 40px 16px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .tagline {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>The Station</h1>
            <p class="tagline">Engaged with the evidence.</p>
            <p class="subtitle">O&G Departmental Educational Newsletter</p>
        </div>

        <div class="newsletter-section">
            <h2 class="section-title">Latest Editions</h2>
            <div class="newsletter-list">
                <a href="march-2026.html" class="newsletter-item">
                    <div class="item-content">
                        <div class="item-title">March 2026</div>
                        <div class="item-meta">Edition</div>
                    </div>
                    <div class="item-arrow">→</div>
                </a>
                <a href="january-2026.html" class="newsletter-item">
                    <div class="item-content">
                        <div class="item-title">January</div>
                        <div class="item-meta">Edition</div>
                    </div>
                    <div class="item-arrow">→</div>
                </a>
                <a href="february-2026.html" class="newsletter-item">
                    <div class="item-content">
                        <div class="item-title">February 2026</div>
                        <div class="item-meta">Edition</div>
                    </div>
                    <div class="item-arrow">→</div>
                </a>
                <a href="april-2026.html" class="newsletter-item">
                    <div class="item-content">
                        <div class="item-title">April 2026</div>
                        <div class="item-meta">Edition</div>
                    </div>
                    <div class="item-arrow">→</div>
                </a>
            </div>
        </div>

        <div class="footer">
            <p class="footer-text">New edition published the first Sunday of each month</p>
            <p class="footer-text" style="margin-top: 24px; color: #86868b;">Created and published by Khalid Shamiyah</p>
        </div>
    </div>
</body>
</html>
