<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Station - O&G Newsletter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            padding: 40px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 2.5em;
        }
        .tagline {
            color: #666;
            font-size: 1em;
            font-style: italic;
            margin-bottom: 32px;
            opacity: 0.8;
        }
        .subtitle {
            color: #888;
            font-size: 0.95em;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .newsletter-list {
            text-align: left;
            margin: 32px 0;
        }
        .newsletter-item {
            background: #f5f5f5;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            text-decoration: none;
            color: #667eea;
            font-weight: 500;
            transition: all 0.3s ease;
            display: block;
            border-left: 4px solid #667eea;
        }
        .newsletter-item:hover {
            background: #667eea;
            color: white;
            transform: translateX(4px);
            border-left-color: white;
        }
        .footer {
            color: #999;
            font-size: 0.9em;
            margin-top: 32px;
            border-top: 1px solid #eee;
            padding-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📰 The Station</h1>
        <div class="tagline">Engaged with the evidence.</div>
        <p class="subtitle">O&G Departmental Educational Newsletter</p>

        <div class="newsletter-list">
            <a href="march-2026.html" class="newsletter-item">March 2026 Edition</a>
            <a href="january-2026.html" class="newsletter-item">January Edition</a>
            <a href="february-2026.html" class="newsletter-item">February 2026 Edition</a>
            <a href="april-2026.html" class="newsletter-item">April 2026 Edition</a>
        </div>

        <p class="footer">Latest editions of The Station newsletter</p>
    </div>
</body>
</html>
